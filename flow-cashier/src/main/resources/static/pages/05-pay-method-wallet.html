<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>05 - 支付方式选择（链接钱包）</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="frame">
      <div class="two-col">
        <!-- 左侧订单信息 -->
        <div class="left">
          <h2 class="left-title">订单详情预览</h2>
          <div class="split-line"></div>

          <div class="product">
            <div class="product-thumb"><div class="bag"></div></div>
            <div>
              <div class="product-name">ipad</div>
            </div>
          </div>

          <div class="split-line"></div>
          <div class="kv">
            <span class="k">商户订单流水号</span>
            <span class="v"><strong>4fcbfd9f...7ef04684</strong><span class="copy">⧉</span></span>
          </div>
          <div class="kv">
            <span class="k">支付订单流水号</span>
            <span class="v"><strong>131772709113001187</strong><span class="copy">⧉</span></span>
          </div>
          <div class="kv">
            <span class="k">法币参考金额</span>
            <span class="v"><strong>10.01 HKD</strong></span>
          </div>

          <div class="split-line"></div>
          <div class="total">
            <span class="label">共计支付</span>
            <div class="amount">
              <span class="unit">USDT</span>
              <span class="num">1.29</span>
            </div>
          </div>

          <div class="bottom-links">
            <span>Privacy</span>
            <span>Disclosure</span>
            <span class="lang">中 ▾</span>
          </div>
        </div>

        <!-- 右侧：支付方式（链接钱包选中） + 网络选择入口 -->
        <div class="right">
          <div class="right-header">
            <div class="back">←</div>
            <h2 class="right-title">支付方式选择</h2>
          </div>

          <div class="panel">
            <div class="option">
              <div class="opt-left">
                <div class="icon coin">₿</div>
                <div>
                  <div class="opt-title">地址转账</div>
                  <div class="opt-sub">转账到钱包地址完成支付</div>
                </div>
              </div>
              <div class="radio"></div>
            </div>

            <div class="option">
              <div class="opt-left">
                <div class="icon">〰</div>
                <div>
                  <div class="opt-title">链接钱包</div>
                  <div class="opt-sub">连接到浏览器插件完成支付</div>
                </div>
              </div>
              <div class="radio on"></div>
            </div>

            <div class="inline-row">
              <div class="badge">
                <span class="coin-dot" style="background:linear-gradient(135deg,#00d395,#00ff9d)"></span>
                <span><strong style="color:var(--text)">USDT</strong> (TRC20)</span>
              </div>
            </div>
          </div>

          <div style="height:14px"></div>

          <div class="panel">
            <div class="option">
              <div class="opt-left">
                <div class="icon tron">T</div>
                <div>
                  <div class="opt-title">处理网络选择</div>
                  <div class="opt-sub">Tron (TRC20) · 预计到账时间: 16秒</div>
                </div>
              </div>
              <div style="color:var(--muted);font-weight:900">›</div>
            </div>
          </div>

          <button class="primary-btn">确认</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
