<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusFlow Cashier</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:100%;max-width:480px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.08);overflow:hidden}
.header{background:linear-gradient(135deg,#1a1f2e,#2d3548);padding:28px 24px;color:#fff}
.header h1{font-size:20px;margin-bottom:12px}
.order-info{display:flex;justify-content:space-between;font-size:14px;opacity:.8}
.body{padding:24px}
.amount{text-align:center;margin-bottom:24px}
.amount .crypto{font-size:36px;font-weight:800;color:#111}
.amount .fiat{font-size:14px;color:#9ca3af;margin-top:4px}
.address-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px}
.address-box .label{font-size:12px;color:#9ca3af;margin-bottom:6px}
.address-box .addr{font-family:monospace;font-size:14px;color:#111;word-break:break-all;margin-bottom:8px}
.copy-btn{display:inline-block;padding:6px 16px;background:#1a1f2e;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer}
.qr{text-align:center;margin-bottom:16px}
.qr-placeholder{width:160px;height:160px;margin:0 auto;border:1px solid #e5e7eb;border-radius:12px;background:repeating-linear-gradient(45deg,#111 0 4px,#fff 4px 8px)}
.timer{text-align:center;font-size:14px;color:#ef4444;margin-bottom:16px}
.status{text-align:center;font-size:14px;color:#22c55e;margin-bottom:16px;display:none}
.tips{font-size:12px;color:#9ca3af;line-height:1.8;padding:12px;background:#fffbeb;border-radius:8px;border:1px solid #fde68a}
.tips .warn{color:#ef4444;font-weight:700}
</style>
</head>
<body>
<div class="card">
<div class="header"><h1>NexusFlow Cashier</h1><div class="order-info"><span id="oid">-</span><span id="ch">-</span></div></div>
<div class="body">
<div class="amount"><div class="crypto" id="ca">-</div><div class="fiat" id="fa">-</div></div>
<div class="address-box"><div class="label">Deposit Address</div><div class="addr" id="pa">-</div><button class="copy-btn" onclick="cp()">Copy</button></div>
<div class="qr"><div class="qr-placeholder"></div><div style="font-size:12px;color:#9ca3af;margin-top:8px">Scan to Pay</div></div>
<div class="timer" id="tm">-</div><div class="status" id="st"></div>
<div class="tips"><p><span class="warn">Important:</span></p><p>1. Send exact amount to the address above</p><p>2. Complete before countdown expires</p><p>3. Order auto-confirms after detection</p></div>
</div></div>
<script>
var p=new URLSearchParams(location.search),pid=p.get('payment_id');
if(!pid)document.body.innerHTML='<h2>Missing payment_id</h2>';
else{ld();setInterval(pl,3000)}
function ld(){fetch('/cashier/order/status?paymentId='+pid).then(function(r){return r.json()}).then(function(d){if(d.success)rd(d.data)}).catch(function(e){})}
function rd(d){
 document.getElementById('oid').textContent=d.paymentId;
 document.getElementById('ch').textContent=d.channelId||'';
 document.getElementById('ca').textContent=(d.amountCrypto||'0')+' '+(d.currencyCrypto||'');
 document.getElementById('fa').textContent='~ '+(d.amountFiat||'0')+' '+(d.currencyFiat||'');
 document.getElementById('pa').textContent=d.payAddress||'...';
 if(d.expireTime){var r=Math.max(0,Math.floor((d.expireTime-Date.now())/1000)),m=Math.floor(r/60),s=r%60;document.getElementById('tm').textContent='Expires: '+m+':'+String(s).padStart(2,'0')}
 if(d.status==='CONFIRMED'){document.getElementById('st').style.display='block';document.getElementById('st').textContent='Payment Successful!'}
}
function cp(){navigator.clipboard.writeText(document.getElementById('pa').textContent).then(function(){alert('Copied')})}
function pl(){fetch('/cashier/order/status?paymentId='+pid).then(function(r){return r.json()}).then(function(d){if(d.success&&d.data){rd(d.data);if(['CONFIRMED','EXPIRED','FAILED'].indexOf(d.data.status)>=0)clearInterval(window._p)}}).catch(function(e){})}
window._p=setInterval(pl,3000);
</script>
</body>
</html>
