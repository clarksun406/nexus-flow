<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01 - 支付方式选择（地址转账）</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="frame">
      <div class="two-col">
        <!-- 左侧订单信息 -->
        <div class="left">
          <h2 class="left-title">订单信息</h2>
          <div class="split-line"></div>
          
          <div class="product">
            <div class="product-thumb">
              <div class="bag"></div>
            </div>
            <div>
              <div class="product-name">商品名称示例</div>
              <div class="kv">
                <span class="k">订单号</span>
                <span class="v"><span>2024030512345678</span><span class="copy">⧉</span></span>
              </div>
              <div class="kv">
                <span class="k">创建时间</span>
                <span class="v"><span>2024-03-05 21:15:30</span></span>
              </div>
            </div>
          </div>

          <div class="split-line"></div>
          <div class="total">
            <span class="label">应付金额</span>
            <div class="amount">
              <span class="unit">CNY</span>
              <span class="num">1,280.00</span>
            </div>
          </div>
        </div>

        <!-- 右侧支付方式 -->
        <div class="right">
          <div class="right-header">
            <div class="back">←</div>
            <h2 class="right-title">选择支付方式</h2>
          </div>

          <div class="panel">
            <div class="option">
              <div class="opt-left">
                <div class="icon coin">₿</div>
                <div>
                  <div class="opt-title">地址转账</div>
                  <div class="opt-sub">支持多种主流币种</div>
                </div>
              </div>
              <div class="radio on"></div>
            </div>

            <div class="option">
              <div class="opt-left">
                <div class="icon">🔗</div>
                <div>
                  <div class="opt-title">链接钱包</div>
                  <div class="opt-sub">MetaMask / WalletConnect</div>
                </div>
              </div>
              <div class="radio"></div>
            </div>

            <div class="option">
              <div class="opt-left">
                <div class="icon">🤝</div>
                <div>
                  <div class="opt-title">第三方合作</div>
                  <div class="opt-sub">支付宝 / 微信支付</div>
                </div>
              </div>
              <div class="radio"></div>
            </div>
          </div>

          <button class="primary-btn">确认支付方式</button>

          <div class="bottom-links">
            <div class="lang">🌐 简体中文</div>
            <span>遇到问题？联系客服</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
