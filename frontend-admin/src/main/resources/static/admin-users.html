<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management - NexusFlow Admin</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dce3ea;
      --text: #17202a;
      --muted: #617080;
      --primary: #7c3aed;
      --green: #15803d;
      --red: #b91c1c;
      --shadow: 0 14px 34px rgba(23, 32, 42, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), #c084fc); }
    .brand strong { font-size: 15px; }
    .brand span { font-size: 12px; color: var(--muted); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px 24px 34px; }
    .btn {
      min-height: 36px;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }
    .btn:hover { border-color: #c8d3dd; background: #fafcff; }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { opacity: 0.9; }
    .btn.danger { color: var(--red); border-color: var(--red); }
    .btn.danger:hover { background: #fef2f2; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }
    .panel h2 { margin: 0 0 12px; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    th { font-weight: 700; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: end; }
    .field { display: grid; gap: 4px; flex: 1; }
    .field label { font-size: 12px; font-weight: 700; color: var(--muted); }
    input, select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      color: var(--text);
      outline: none;
      font-size: 13px;
    }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; }
    .status.ok { display: block; background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; }
    .status.err { display: block; background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
    .loading { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <strong>NexusFlow Admin</strong>
        <span>User Management</span>
      </div>
    </div>
    <a href="index.html" class="btn">Back</a>
  </header>

  <main class="wrap">
    <div class="panel">
      <h2>Lookup User Roles</h2>
      <div class="form-row">
        <div class="field">
          <label>User ID (UUID)</label>
          <input id="userIdInput" placeholder="e.g. 00000000-0000-0000-0000-000000000001" />
        </div>
        <div class="field" style="max-width:180px">
          <label>Scope Type</label>
          <select id="scopeTypeInput">
            <option value="">All</option>
            <option value="SYSTEM">SYSTEM</option>
            <option value="MERCHANT">MERCHANT</option>
          </select>
        </div>
        <button class="btn primary" onclick="lookupRoles()">Lookup</button>
      </div>
      <div id="lookupStatus" class="status"></div>
      <div id="lookupLoading" class="loading" style="display:none">Loading...</div>
      <table id="rolesTable" style="display:none">
        <thead><tr><th>Role Code</th><th>Scope Type</th><th>Scope ID</th><th>Actions</th></tr></thead>
        <tbody id="rolesBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Grant Role to User</h2>
      <div class="form-row">
        <div class="field">
          <label>User ID (UUID)</label>
          <input id="grantUserId" placeholder="User UUID" />
        </div>
        <div class="field">
          <label>Role ID (UUID)</label>
          <input id="grantRoleId" placeholder="Role UUID" />
        </div>
        <div class="field" style="max-width:160px">
          <label>Scope Type</label>
          <select id="grantScopeType">
            <option value="MERCHANT">MERCHANT</option>
            <option value="SYSTEM">SYSTEM</option>
          </select>
        </div>
        <div class="field">
          <label>Scope ID (UUID, optional)</label>
          <input id="grantScopeId" placeholder="Merchant UUID" />
        </div>
        <button class="btn primary" onclick="grantRole()">Grant</button>
      </div>
      <div id="grantStatus" class="status"></div>
    </div>

    <div class="panel">
      <h2>Revoke Role from User</h2>
      <div class="form-row">
        <div class="field">
          <label>User ID (UUID)</label>
          <input id="revokeUserId" placeholder="User UUID" />
        </div>
        <div class="field">
          <label>Role ID (UUID)</label>
          <input id="revokeRoleId" placeholder="Role UUID" />
        </div>
        <div class="field" style="max-width:160px">
          <label>Scope Type</label>
          <select id="revokeScopeType">
            <option value="MERCHANT">MERCHANT</option>
            <option value="SYSTEM">SYSTEM</option>
          </select>
        </div>
        <div class="field">
          <label>Scope ID (UUID, optional)</label>
          <input id="revokeScopeId" placeholder="Merchant UUID" />
        </div>
        <button class="btn danger" onclick="revokeRole()">Revoke</button>
      </div>
      <div id="revokeStatus" class="status"></div>
    </div>
  </main>

  <script>
    const CONFIG_KEY = 'nexusflow.admin.config';
    const API = '/admin';
    let apiBase = '';

    (function loadConfig() {
      try {
        apiBase = (JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}').apiBase || '').replace(/\/$/, '');
      } catch (_) {}
    })();

    async function apiFetch(path, options = {}) {
      const res = await fetch(apiBase + path, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      if (res.status === 401) {
        window.location.href = 'admin-login.html';
        throw new Error('Session expired');
      }
      return res;
    }

    async function lookupRoles() {
      const userId = document.getElementById('userIdInput').value.trim();
      const scopeType = document.getElementById('scopeTypeInput').value;
      const loading = document.getElementById('lookupLoading');
      const table = document.getElementById('rolesTable');
      const st = document.getElementById('lookupStatus');
      if (!userId) {
        st.className = 'status err';
        st.textContent = 'User ID is required';
        return;
      }
      loading.style.display = '';
      table.style.display = 'none';
      try {
        let url = API + '/users/' + userId + '/roles';
        if (scopeType) url += '?scopeType=' + scopeType;
        const res = await apiFetch(url);
        if (!res.ok) throw new Error('Failed: ' + res.status);
        const roles = await res.json();
        loading.style.display = 'none';
        table.style.display = '';
        const body = document.getElementById('rolesBody');
        body.innerHTML = '';
        if (roles.length === 0) {
          body.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">No roles found</td></tr>';
          return;
        }
        roles.forEach((role) => {
          body.innerHTML += `<tr>
            <td><code>${role.roleCode || role.roleId || '-'}</code></td>
            <td>${role.scopeType || '-'}</td>
            <td>${role.scopeId || '-'}</td>
            <td><button class="btn danger" onclick="revokeRoleDirect('${userId}','${role.roleId}','${role.scopeType || 'MERCHANT'}','${role.scopeId || ''}')">Revoke</button></td>
          </tr>`;
        });
      } catch (error) {
        loading.style.display = 'none';
        st.className = 'status err';
        st.textContent = 'Error: ' + error.message;
      }
    }

    async function grantRole() {
      const userId = document.getElementById('grantUserId').value.trim();
      const roleId = document.getElementById('grantRoleId').value.trim();
      const scopeType = document.getElementById('grantScopeType').value;
      const scopeId = document.getElementById('grantScopeId').value.trim();
      const st = document.getElementById('grantStatus');
      if (!userId || !roleId) {
        st.className = 'status err';
        st.textContent = 'User ID and Role ID are required';
        return;
      }
      try {
        const body = { userId, roleId, scopeType };
        if (scopeId) body.scopeId = scopeId;
        const res = await apiFetch(API + '/users/grant-role', {
          method: 'POST',
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        st.className = 'status ok';
        st.textContent = 'Role granted successfully';
      } catch (error) {
        st.className = 'status err';
        st.textContent = 'Error: ' + error.message;
      }
    }

    async function revokeRole() {
      const userId = document.getElementById('revokeUserId').value.trim();
      const roleId = document.getElementById('revokeRoleId').value.trim();
      const scopeType = document.getElementById('revokeScopeType').value;
      const scopeId = document.getElementById('revokeScopeId').value.trim();
      const st = document.getElementById('revokeStatus');
      if (!userId || !roleId) {
        st.className = 'status err';
        st.textContent = 'User ID and Role ID are required';
        return;
      }
      await doRevoke(userId, roleId, scopeType, scopeId, st);
    }

    async function revokeRoleDirect(userId, roleId, scopeType, scopeId) {
      if (!confirm('Revoke this role?')) return;
      const st = document.getElementById('lookupStatus');
      await doRevoke(userId, roleId, scopeType, scopeId, st);
      lookupRoles();
    }

    async function doRevoke(userId, roleId, scopeType, scopeId, stEl) {
      try {
        let url = API + '/users/' + userId + '/roles/' + roleId + '?scopeType=' + scopeType;
        if (scopeId) url += '&scopeId=' + scopeId;
        const res = await apiFetch(url, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed: ' + res.status);
        stEl.className = 'status ok';
        stEl.textContent = 'Role revoked';
      } catch (error) {
        stEl.className = 'status err';
        stEl.textContent = 'Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
