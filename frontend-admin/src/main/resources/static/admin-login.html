<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - NexusFlow Admin Console</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dce3ea;
      --text: #17202a;
      --muted: #617080;
      --primary: #7c3aed;
      --red: #b91c1c;
      --shadow: 0 14px 34px rgba(23, 32, 42, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: 100%;
      max-width: 400px;
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .mark { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), #c084fc); }
    h1 { margin: 0; font-size: 20px; }
    .muted { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .btn {
      width: 100%;
      min-height: 44px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      background: #fef2f2;
      color: var(--red);
      border: 1px solid #fecaca;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>Admin Console</h1>
        <p class="muted">Platform administrator login</p>
      </div>
    </div>
    <form id="loginForm" onsubmit="return login(event)">
      <div class="field">
        <label for="apiBase">API Base</label>
        <input id="apiBase" autocomplete="off" placeholder="http://localhost:8080" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" placeholder="admin@nexusflow.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password" placeholder="Enter your password" />
      </div>
      <button class="btn" type="submit" id="submitBtn">Sign In</button>
      <div id="error" class="error"></div>
    </form>
  </div>

  <script>
    const CONFIG_KEY = 'nexusflow.admin.config';

    (function loadConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
        document.getElementById('apiBase').value = saved.apiBase || '';
      } catch (_) {}
    })();

    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      err.style.display = 'none';
      try {
        const apiBase = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
        localStorage.setItem(CONFIG_KEY, JSON.stringify({ apiBase }));
        const res = await fetch(apiBase + '/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Login failed');
        }
        window.location.href = 'index.html';
      } catch (error) {
        err.textContent = error.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
