spring:
  application:
    name: nexus-flow
  datasource:
    url: jdbc:postgresql://localhost:5432/nexusflow
    username: nexusflow
    password: ${DB_PASSWORD:nexusflow}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: true
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

nexusflow:
  # ── Security ──
  api:
    key: ${API_KEY:}                        # merchant API key (X-API-Key header); required in production
    rate-limit:
      per-minute: ${RATE_LIMIT_PER_MINUTE:120}  # max requests per client IP per minute
  callback:
    hmac-secret:
      STUB: ${CALLBACK_HMAC_SECRET_STUB:}   # HMAC-SHA256 shared secret for STUB channel
      BITMART: ${CALLBACK_HMAC_SECRET_BITMART:}  # HMAC-SHA256 shared secret for BITMART channel
      COINBASE_COMMERCE: ${CALLBACK_HMAC_SECRET_COINBASE_COMMERCE:} # Coinbase Commerce callback secret
      SELF_HOSTED_NODE: ${CALLBACK_HMAC_SECRET_SELF_HOSTED_NODE:${WEBHOOK_HMAC_SECRET:}} # internal execution callback
  encryption:
    key: ${ENCRYPTION_KEY:}                 # base64-encoded 32-byte AES-256 key; required in production
    allow-generated-key: ${ALLOW_GENERATED_KEY:false} # set true explicitly only for local development
  webhook:
    hmac-secret: ${WEBHOOK_HMAC_SECRET:}    # HMAC-SHA256 key for signing outbound webhooks to merchants

  # ── Blockchain ──
  tron:
    node-url: ${TRON_NODE_URL:https://api.trongrid.io}
    usdt-contract: ${TRON_USDT_CONTRACT:TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t}
  ethereum:
    rpc-url: ${ETH_RPC_URL:http://localhost:8545}
    usdt-contract: ${ETH_USDT_CONTRACT:0xdAC17F958D2ee523a2206206994597C13D831ec7}
  bitcoin:
    node-url: ${BTC_RPC_URL:http://localhost:8332}
    username: ${BTC_RPC_USERNAME:}
    password: ${BTC_RPC_PASSWORD:}
  scanner:
    interval-ms: 15000
    reorg-rewind-blocks: ${SCANNER_REORG_REWIND_BLOCKS:12}
  blockchain:
    circuit-breaker:
      failure-threshold: ${BLOCKCHAIN_CB_FAILURE_THRESHOLD:3}
      cooldown-seconds: ${BLOCKCHAIN_CB_COOLDOWN_SECONDS:30}
  payment:
    expiry-minutes: 30        # PENDING payments older than this are marked EXPIRED
  reconciliation:
    interval-ms: 30000        # how often to re-check confirmations for DETECTED/CONFIRMING
    max-backoff-seconds: ${RECONCILIATION_MAX_BACKOFF_SECONDS:300}
  expiry:
    interval-ms: 60000        # how often to scan for overdue PENDING payments
  execution:
    persistence: jpa          # jpa (default) | memory
  address-pool:
    seed-mnemonic: ${ADDRESS_POOL_SEED_MNEMONIC:} # BIP39 seed for deterministic address replenishment
    chains: ${ADDRESS_POOL_CHAINS:TRON,ETH,BTC}
    target-size: ${ADDRESS_POOL_TARGET_SIZE:20}
    batch-size: ${ADDRESS_POOL_BATCH_SIZE:10}
    replenish-interval-ms: ${ADDRESS_POOL_REPLENISH_INTERVAL_MS:60000}
  order:
    expiry:
      interval-ms: 60000    # how often to scan for overdue WAITING_PAYMENT orders
  self-hosted-channel:
    enabled: ${SELF_HOSTED_CHANNEL_ENABLED:false} # enable PaymentOrder -> CryptoPayment channel

  # ── Cache ──
  cache:
    enabled: false            # set to true to enable Redis-backed rate + currency cache
    rate-ttl-seconds: 60      # how long an exchange rate is cached
    currency-ttl-seconds: 300 # how long supported-currency lists are cached

  # ── Idempotency ──
  idempotency:
    store: memory             # memory (default) | redis — dedup backend for channel callbacks
    ttl-seconds: 86400        # redis only: how long a processed eventId is remembered
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

logging:
  level:
    com.nexusflow: DEBUG
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","logger":"%logger","message":"%msg"}%n'
