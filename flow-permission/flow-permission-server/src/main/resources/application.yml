server:
  port: 8090

spring:
  application:
    name: flow-permission

  datasource:
    url: jdbc:postgresql://localhost:5432/nexusflow_permission
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.nexusflow.permission: DEBUG

permission:
  auth:
    enabled: ${PERMISSION_AUTH_ENABLED:true}
  service-token: ${PERMISSION_SERVICE_TOKEN:}
